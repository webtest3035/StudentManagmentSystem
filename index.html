<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Management System</title>
</head>

<main>

    <body>
        <div class="tabel-page">
            <h1>Student Management System</h1>

            <div class="table-Form">

                <div class="table-form-inputs">
                    <label for="studentName">Student Name</label>
                    <input type="text" id="studentName" placeholder="Enter Here">

                </div>
                <div class="table-form-inputs">
                    <label for="studentAge">Student Age</label>
                    <input type="number" id="studentAge" placeholder="Enter Here">
                </div>
                <div class="table-form-inputs">
                    <label for="StudentGenderInput">Student Gender</label>
                    <select id="StudentGenderInput">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>

                </div>
                <div class="table-form-inputs">
                    <label for="StudentCourseInput">Select Your Course</label>
                    <select id="StudentCourseInput">
                        <option value="BA">BA</option>
                        <option value="BCA">BCA</option>
                        <option value="BCOM">BCOM</option>
                        <option value="BBA">BBA</option>
                        <option value="BAIT">BAIT</option>
                    </select>

                </div>
                <div class="table-form-buttons">
                    <button id="addStudent">+ ADD Students</button>
                    <button id="updateStudent">Update Student</button>
                </div>

            </div>
            <table class="table">

                <thead class="table">
                    <tr>
                        <th class="table">Sr. No.</th>
                        <th class="table">STD Name</th>
                        <th class="table">STD Age</th>
                        <th class="table">STD Gender</th>
                        <th class="table">STD Course</th>
                        <th class="table">Actions</th>
                    </tr>
                </thead>
                <tbody id="studentsData" class="table"></tbody>
            </table>
            <div id="loading">
                <h3>Loading...</h3>
            </div>
        </div>
        

        <div class="pagination" id="pagination">
            <button class="paginationButtons" id="previousPage">Prev</button>
            <button class="paginationButtons" id="nextPage">Next</button>
        </div>

</main>

<script src="script.js"></script>
</body>

</html>
